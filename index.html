<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Geo Business &amp; Communication Intelligence System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#F4F6F9;
  --panel:#FFFFFF;
  --ink:#2A2640;
  --muted:#6B7280;
  --line:#E3E8F2;
  --navy:#5B4FD6;
  --navy2:#4A3FBE;
  --teal:#12B7A4;
  --tealDeep:#0E8C7D;
  --blue:#BAD7FF;
  --blueDeep:#3E6FB8;
  --pink:#FFB2FF;
  --pinkDeep:#B23FB2;
  --lavender:#8B7AF1;
  --green:#3FAE73;
  --greenDeep:#1F7A4C;
  --red:#C54E4E;
  --orange:var(--pink);
  --shadow:0 14px 36px rgba(91,79,214,.10);
  --radius:16px;
  --font:"Manrope","Inter","Montserrat","Poppins",-apple-system,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:13.5px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font:inherit;}
h1,h2,h3,h4{font-family:var(--font);color:var(--navy);font-weight:800;margin:0;letter-spacing:-0.01em;}
a{color:var(--navy2);}
.tabular{font-variant-numeric:tabular-nums;}

.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
aside{
  background:linear-gradient(180deg,#4A3FBE,#5B4FD6 55%,#8B7AF1);
  color:#F1EEFE;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto;
}
.brand{display:flex;gap:11px;align-items:center;margin-bottom:18px;padding:6px;}
.brand img{width:100%;max-width:170px;border-radius:8px;background:#fff;padding:6px 8px;}
.nav button{
  width:100%;border:0;background:transparent;color:#E4DFFB;text-align:left;
  padding:9px 12px;border-radius:10px;margin:2px 0;cursor:pointer;
  display:flex;align-items:center;gap:9px;font-size:12.8px;font-weight:600;
}
.nav button:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav button.active{background:rgba(18,183,164,.24);color:#fff;box-shadow:inset 3px 0 0 var(--teal);}
.nav .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.nav-group{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#B9AEF2;font-weight:800;margin:16px 8px 6px;}
.nav-group:first-child{margin-top:2px;}

main{padding:16px 22px 40px;overflow-x:hidden;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.title h2{font-size:20px;}
.title p{margin:3px 0 0;color:var(--muted);font-size:12px;}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}

.btn{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:10px;padding:8px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-size:12.5px;font-weight:700;text-decoration:none;}
.btn:hover{box-shadow:0 6px 16px rgba(12,56,81,.12);}
.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn.primary:hover{background:var(--tealDeep);}
.btn.soft{background:#E3F9F6;color:var(--tealDeep);border-color:#BEEAE3;}
.btn.orange{background:var(--pink);color:var(--pinkDeep);border-color:var(--pink);}
.btn.danger{background:#FBE9E9;color:var(--red);border-color:#F3C6C6;}
.btn.small{padding:5px 9px;border-radius:8px;font-size:11.5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.kpis{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr);}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.kpi{padding:12px 14px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;border-left:4px solid var(--line);}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(91,79,214,.18);}
.kpi.k-blue{border-left-color:var(--blue);}
.kpi.k-pink{border-left-color:var(--pink);}
.kpi.k-lavender{border-left-color:var(--lavender);}
.kpi.k-teal{border-left-color:var(--teal);}
.kpi.k-green{border-left-color:var(--green);}
.kpi label{display:block;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-weight:700;}
.kpi strong{font-size:21px;letter-spacing:-.03em;color:var(--navy);}
.kpi span{float:right;border-radius:999px;padding:2px 7px;font-size:10.5px;background:#EDEBFB;color:var(--navy);font-weight:700;}

.tab{display:none;}
.tab.active{display:block;}
.grid2{display:grid;grid-template-columns:1.4fr .8fr;gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:1050px){.grid2,.grid3,.grid4{grid-template-columns:1fr;}}
.section{padding:14px 16px;}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.section-title{margin:0;font-size:14.5px;}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.toolbar input,.toolbar select{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 10px;outline:none;min-height:34px;font-size:12.5px;}
.toolbar input{min-width:200px;flex:1;}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:12.3px;}
th,td{padding:8px 10px;border-bottom:1px solid #EDF2F6;text-align:left;vertical-align:middle;}
th{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;background:#F6F4FC;position:sticky;top:0;font-weight:800;}
tr:hover td{background:#FBFDFE;}
.table-wrap{max-height:calc(100vh - 260px);overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff;}

.chip{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 8px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.chip.navy{background:#EDEBFB;color:var(--navy);}
.chip.teal{background:#E3F9F6;color:var(--tealDeep);}
.chip.orange{background:#FEEBFE;color:var(--pinkDeep);}
.chip.green{background:#E5F7EC;color:var(--greenDeep);}
.chip.red{background:#FBEAEA;color:var(--red);}
.chip.grey{background:#EEF0F5;color:var(--muted);}
.actions{display:flex;gap:5px;flex-wrap:wrap;}
.mini{font-size:10.8px;color:var(--muted);}

.score-badge{display:inline-flex;align-items:center;gap:5px;font-weight:800;border-radius:10px;padding:3px 9px;font-size:11.5px;}
.score-badge.hi{background:#E5F7EC;color:var(--greenDeep);}
.score-badge.mid{background:#FEEBFE;color:var(--pinkDeep);}
.score-badge.lo{background:#EEF0F5;color:var(--muted);}

.bar{height:7px;background:#E2E8F0;border-radius:99px;overflow:hidden;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--lavender),var(--teal));border-radius:99px;}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:980px){.board{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.board{grid-template-columns:1fr;}}
.lane{background:#F5F3FC;border:1px solid var(--line);border-radius:14px;padding:10px;min-height:160px;}
.lane h4{margin:0 0 8px;font-size:12px;display:flex;justify-content:space-between;color:var(--navy);}
.task{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:0 6px 16px rgba(0,0,0,.04);cursor:pointer;}
.task:hover{border-color:var(--teal);}
.task strong{display:block;font-size:12px;margin-bottom:4px;color:var(--navy);}
.task .meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}

.geo-layout{display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:start;}
@media(max-width:980px){.geo-layout{grid-template-columns:1fr;}}
#map{height:560px;border-radius:14px;border:1px solid var(--line);}
.leaflet-popup-content-wrapper{border-radius:10px;font-family:var(--font);}
.geo-side{display:flex;flex-direction:column;gap:12px;max-height:560px;overflow-y:auto;overflow-x:hidden;padding-right:2px;}
.geo-side .card{overflow:hidden;min-width:0;}
#geo-hub-list{max-height:220px;overflow-y:auto;overflow-x:hidden;padding-right:4px;}
#geo-unmapped-list{max-height:180px;overflow-y:auto;overflow-x:hidden;padding-right:4px;word-break:break-word;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11.8px;margin-bottom:6px;flex-wrap:wrap;}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.hub-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:11.8px;}
.hub-item:last-child{border-bottom:none;}
.hub-item .hn{font-weight:700;color:var(--navy);word-break:break-word;}

.timeline{display:flex;flex-direction:column;gap:8px;}
.time-item{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 10px;}

.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(42,38,64,.45);z-index:40;}
.drawer-backdrop.active{display:block;}
.drawer{position:fixed;right:-540px;top:0;height:100vh;width:520px;background:#fff;box-shadow:-24px 0 60px rgba(0,0,0,.18);z-index:41;transition:.25s ease;display:flex;flex-direction:column;}
.drawer.active{right:0;}
.drawer-head{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.drawer-body{padding:16px;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;}
.drawer-body label{display:flex;flex-direction:column;gap:5px;font-size:11.5px;color:var(--navy);font-weight:700;}
.drawer-body input,.drawer-body select,.drawer-body textarea{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--font);font-size:12.5px;font-weight:500;color:var(--ink);}
.drawer-body textarea{min-height:70px;resize:vertical;}
.drawer-body .wide{grid-column:1/-1;}
.drawer-body input[type=checkbox]{width:auto;align-self:flex-start;}
.drawer-foot{padding:14px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

.empty{padding:26px;text-align:center;color:var(--muted);}
.score-explain{background:#F5F8FA;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap;}

.report{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:900px){.report-grid{grid-template-columns:1fr;}}
.report-box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#F6F4FC;}
.report-box h4{margin:0 0 8px;}
.report-box ul{margin:0;padding-left:16px;font-size:11.8px;}

.ai-panel{display:grid;grid-template-columns:340px 1fr;gap:14px;}
@media(max-width:980px){.ai-panel{grid-template-columns:1fr;}}
.ai-tool-list button{width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;font-size:12.3px;font-weight:700;color:var(--navy);}
.ai-tool-list button:hover{border-color:var(--teal);}
.ai-tool-list button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.ai-tool-list button .d{display:block;font-weight:500;color:var(--muted);font-size:11px;margin-top:3px;}
.ai-tool-list button.active .d{color:#DCD5FB;}
.ai-output{background:#F5F8FA;border:1px solid var(--line);border-radius:12px;padding:16px;font-size:12.6px;line-height:1.65;white-space:pre-wrap;font-family:"SFMono-Regular",Consolas,monospace;max-height:460px;overflow-y:auto;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-family:var(--font);font-size:12.5px;}
.field textarea{min-height:60px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.notice{background:#FBEEEA;border:1px solid #E8C2B8;color:#8C4A3D;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;}
.notice.info{background:#E3F9F6;border-color:#B9EAE2;color:var(--tealDeep);}
.small-muted{font-size:11.5px;color:var(--muted);}
.divider{height:1px;background:var(--line);margin:14px 0;}

.gcal-embed-wrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;}
.gcal-embed-wrap iframe{width:100%;height:560px;border:0;display:block;}

.toast{position:fixed;bottom:18px;right:18px;background:var(--navy);color:#fff;padding:10px 14px;border-radius:12px;box-shadow:var(--shadow);display:none;z-index:60;font-size:12.5px;font-weight:600;}
.toast.show{display:block;}

footer.appfoot{text-align:center;padding:20px;font-size:11px;color:#8A84A8;border-top:1px solid var(--line);margin-top:18px;}

::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:#D3CFEA;border-radius:8px;}

@media(max-width:1100px){
  .app{grid-template-columns:1fr;}
  aside{position:relative;height:auto;}
  .nav{display:flex;overflow-x:auto;gap:2px;}
  .nav-group{display:none;}
  .nav button{white-space:nowrap;}
  .drawer{width:100%;right:-100%;}
  .drawer-body{grid-template-columns:1fr;}
}
@media print{
  aside,.top-actions,.toolbar,.btn,.drawer-backdrop,.drawer,.nav,.actions,.no-print{display:none !important;}
  .app{display:block;}
  main{padding:0;}
  .tab{display:none !important;}
  .tab#tab-printarea{display:block !important;}
  .card{box-shadow:none;border:1px solid #ddd;}
}

</style>
</head>

function fieldHTML(f, v, type){
  const wide = WIDE_FIELDS.includes(f);
  if(f==="owner"){
    return `<label>${label(f)}<select name="${f}">${db.team.map(t=>`<option ${v===t?"selected":""}>${esc(t)}</option>`).join("")}</select></label>`;
  }
  if(f==="org" && type!=="organizations"){
    const orgNames = db.organizations.map(o=>o.name);
    return `<label class="${wide?"wide":""}">${label(f)}<input name="${f}" list="orgOptions" value="${esc(v||"")}" placeholder="Type or pick an organization"></label>`;
  }
  if(f==="opportunity" && type==="proposals"){
    return `<label class="wide">${label(f)}<select name="${f}"><option value="">— none —</option>${db.opportunities.map(o=>`<option value="${esc(o.title)}" ${v===o.title?"selected":""}>${esc(o.title)}</option>`).join("")}</select></label>`;
  }
  const opts = optionsFor(f, type);
  if(opts){
    return `<label>${label(f)}<select name="${f}">${opts.map(o=>`<option ${v===o?"selected":""}>${esc(o)}</option>`).join("")}</select></label>`;
  }
  if(CHECKBOX_FIELDS.includes(f)){
    return `<label style="flex-direction:row;align-items:center;gap:8px;">${label(f)}<input type="checkbox" name="${f}" ${v?"checked":""}></label>`;
  }
  if(TEXTAREA_FIELDS.includes(f)){
    return `<label class="wide">${label(f)}<textarea name="${f}">${esc(v||"")}</textarea></label>`;
  }
  let inputType = "text";
  if(DATE_FIELDS.includes(f)) inputType = "date";
  else if(DATETIME_FIELDS.includes(f)) inputType = "datetime-local";
  else if(NUMBER_FIELDS.includes(f)) inputType = "number";
  else if(f==="email") inputType = "email";
  else if(f==="website" || f==="linkedin") inputType = "text";
  return `<label class="${wide?"wide":""}">${label(f)}<input name="${f}" type="${inputType}" value="${esc(v??"")}" ${inputType==="number"?'step="any"':""}></label>`;
}

  return {organizations:"organization",contacts:"contact",opportunities:"opportunity",events:"event",
    meetings:"meeting",communications:"communication log",proposals:"proposal",products:"product",tasks:"task"}[type]||type;

  document.getElementById("drawerBackdrop").classList.remove("active");
  document.getElementById("drawer").classList.remove("active");

function saveRecord(ev){
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const obj = {};
  schemas[drawerType].forEach(f=>{
    if(CHECKBOX_FIELDS.includes(f)) obj[f] = fd.get(f)==="on";
    else obj[f] = fd.get(f) || "";
  });
  if(editingId){
    const idx = db[drawerType].findIndex(x=>x.id===editingId);
    if(idx>-1) db[drawerType][idx] = {...db[drawerType][idx], ...obj};
  } else {
    db[drawerType].push({id: uid(drawerType[0]), ...obj});
  }
  const savedType = drawerType;
  closeDrawer();
  renderAll();
  switchTab(currentTab);
  toast("Saved");
  autoPushType(savedType);
}
function deleteRecord(type, id){
  if(!confirm("Delete this record?")) return;
  db[type] = db[type].filter(x=>x.id!==id);
  renderAll();
  switchTab(currentTab);
  toast("Deleted");
  autoPushType(type);

/* ===================== GENERIC FILTER TOOLBAR ===================== */
function getFilter(prefix){
  return {
    q: document.getElementById(prefix+"-q")?.value || "",
    a: document.getElementById(prefix+"-a")?.value || "",
    b: document.getElementById(prefix+"-b")?.value || ""
  };
}
function filterRows(rows, prefix, fieldA, fieldB){
  const vals = getFilter(prefix);
  const q = (vals.q||"").toLowerCase();
  return rows.filter(r=>{
    const text = Object.values(r).join(" ").toLowerCase();
    const okQ = !q || text.includes(q);
    const okA = !vals.a || r[fieldA]===vals.a;
    const okB = !vals.b || r[fieldB]===vals.b;
    return okQ && okA && okB;
  });
}
function toolbar(prefix, type, fieldA, fieldB, optsA, optsB){
  const selA = optsA ? `<select id="${prefix}-a" onchange="render${cap(type)}()"><option value="">All ${label(fieldA).toLowerCase()}</option>${optsA.map(o=>`<option>${esc(o)}</option>`).join("")}</select>` : "";
  const selB = optsB ? `<select id="${prefix}-b" onchange="render${cap(type)}()"><option value="">All ${label(fieldB).toLowerCase()}</option>${optsB.map(o=>`<option>${esc(o)}</option>`).join("")}</select>` : "";
  return `<div class="toolbar">
    <input id="${prefix}-q" placeholder="Search…" oninput="render${cap(type)}()">
    ${selA}${selB}
    <button class="btn small primary" onclick="openDrawer('${type}')">+ Add</button>
    <button class="btn small" onclick="exportCSV('${type}')">CSV</button>
  </div>`;
}

  "Submitted":"navy","Follow-up":"orange","Won":"green","Lost":"red","Archived":"grey",

  "Prospect":"grey","In Discussion":"orange","Active Partner":"teal","MoU Signed":"green","Dormant":"grey",
  // relationship
  "Cold":"grey","Warm":"orange","Strong":"teal","Champion":"green"
};
function chip(v){ return v ? `<span class="chip ${CHIP_CLASS[v]||"grey"}">${esc(v)}</span>` : "—"; }

/* ===================== OPPORTUNITY SCORING MODEL =====================
   Weights (per BD scoring brief): Sector match 25, Country/internationalisation
   value 20, Eligibility fit 20, Budget/value 15, Relationship strength 10,
   Deadline feasibility 10. */
const CORE_SECTORS = ["Climate/Environment","GIS/Remote Sensing","AI","DRR","ESG"];
const REL_SCORE = {"":0,"Cold":2,"Warm":6,"Strong":8,"Champion":10};
function scoreOpportunity(o){
  const reasons = [];
  let sectorScore = CORE_SECTORS.includes(o.sector) ? 25 : (o.sector ? 12 : 0);
  reasons.push(o.sector ? `Sector "${o.sector}" — ${sectorScore}/25` : `No sector set — 0/25`);

  let scopeScore = o.scope==="International" ? 20 : (o.scope==="National" ? 12 : 0);
  reasons.push(o.scope ? `${o.scope} scope — ${scopeScore}/20` : `No scope set — 0/20`);

  let eligScore = o.eligibilityConfirmed ? 20 : (o.eligibility ? 10 : 0);
  reasons.push(o.eligibilityConfirmed ? `Eligibility confirmed — 20/20` : (o.eligibility ? `Eligibility noted but unconfirmed — 10/20` : `Eligibility not assessed — 0/20`));

  const budgetNum = parseFloat(o.budget) || 0;
  let budgetScore = budgetNum>=100000 ? 15 : budgetNum>=20000 ? 10 : budgetNum>0 ? 5 : 0;
  reasons.push(budgetNum ? `Est. value $${budgetNum.toLocaleString()} — ${budgetScore}/15` : `No estimated value — 0/15`);

  let relScore = REL_SCORE[o.relationship] ?? 0;
  reasons.push(o.relationship ? `Relationship "${o.relationship}" — ${relScore}/10` : `Relationship not rated — 0/10`);

  const d = daysUntil(o.deadline);
  let deadlineScore = d===null ? 5 : d<0 ? 0 : d>60 ? 10 : d>20 ? 7 : d>=7 ? 4 : 2;
  reasons.push(d===null ? `No deadline set — 5/10 (neutral)` : d<0 ? `Deadline passed — 0/10` : `Deadline in ${d} day(s) — ${deadlineScore}/10`);

  const total = sectorScore+scopeScore+eligScore+budgetScore+relScore+deadlineScore;
  const decision = total>=70 ? "Pursue" : total>=45 ? "Review" : "Deprioritise";
  return {total, decision, reasons};
}
function scoreBadge(o){
  const s = scoreOpportunity(o);
  const cls = s.total>=70?"hi":s.total>=45?"mid":"lo";
  return `<span class="score-badge ${cls}" title="${esc(s.reasons.join(' | '))}">${s.total}/100 · ${s.decision}</span>`;
}

const GOOGLE_SCOPES = "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/spreadsheets";

function connectGoogle(clientIdInputId, onConnected){
  const el = clientIdInputId && document.getElementById(clientIdInputId);
  const clientId = (el && el.value.trim()) || gstate.clientId;
  if(!clientId){ toast("Paste your Google OAuth Client ID first"); return; }

  }
  try{

      client_id: clientId,

      callback: (resp)=>{
        if(resp.error){ toast("Google sign-in failed: "+resp.error); return; }
        gstate.accessToken = resp.access_token;
        toast("Connected to Google");

        if(typeof onConnected === "function") onConnected();
      }
    });
    tokenClient.requestAccessToken();
  }catch(err){
    toast("Could not start Google sign-in: "+err.message+" — this needs the page served over http(s), not opened as a local file.");
  }
}

function timeAgo(d){
  const s = Math.round((Date.now()-d.getTime())/1000);
  if(s<5) return "just now";
  if(s<60) return s+"s ago";
  if(s<3600) return Math.floor(s/60)+"m ago";
  return Math.floor(s/3600)+"h ago";
}
function syncStatusText(){
  if(!gstate.accessToken) return "Not connected to Google";
  if(!gstate.spreadsheetId) return "Connected — no shared spreadsheet set yet";
  if(gstate.syncing) return "Syncing…";
  if(gstate.lastSync) return "Synced " + timeAgo(gstate.lastSync);
  return "Connected — ready to sync";
}
function updateSyncStatus(){
  ["syncStatus","syncStatusSettings"].forEach(id=>{
    const el = document.getElementById(id);

function updateURLParam(id){

/* ===================== GOOGLE SHEETS SYNC (shared team data) =====================
   Every record type gets its own tab, header row = ["id", ...schema fields].
   Push = clear the tab, rewrite it whole from the in-memory db. Pull = read the
   tab, replace the in-memory db for that type. This is simple and reliable, but
   it's whole-tab last-write-wins — not cell-level real-time merging. Two people
   saving the *same* tab within moments of each other can clobber one another;
   for a small BD team saving occasionally, that's a reasonable trade-off. */
const SHEET_TYPES = ["organizations","contacts","opportunities","events","meetings","communications","proposals","products","tasks"];
function parseSpreadsheetId(input){
  input = (input||"").trim();
  const m = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : input;
}
function sheetsFetch(path, options={}){
  if(!gstate.accessToken){ toast("Connect Google first"); return Promise.reject(new Error("not connected")); }
  if(!gstate.spreadsheetId){ toast("Set a shared spreadsheet first"); return Promise.reject(new Error("no spreadsheet")); }
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${gstate.spreadsheetId}${path}`;
  return fetch(url, {...options, headers:{...(options.headers||{}), Authorization:"Bearer "+gstate.accessToken, "Content-Type":"application/json"}})
    .then(async r=>{
      if(r.status===401){ gstate.accessToken=null; updateSyncStatus(); toast("Google session expired — click Connect Google again."); throw new Error("unauthorized"); }
      if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error("HTTP "+r.status+" "+t.slice(0,150)); }
      return r.json();
    });
}
function sheetHeaders(type){ return ["id", ...schemas[type]]; }
function rowsForSheet(type){
  const headers = sheetHeaders(type);
  return [headers, ...db[type].map(r=>headers.map(h=>{
    const v = r[h];
    if(typeof v === "boolean") return v ? "TRUE" : "FALSE";
    return (v===undefined || v===null) ? "" : String(v);
  }))];
}
function recordsFromSheetValues(type, values){
  if(!values || values.length<2) return [];
  const headers = values[0];
  return values.slice(1)
    .filter(row=>row.some(c=>c!==""&&c!==undefined))
    .map(row=>{
      const obj = {};
      headers.forEach((h,i)=>{
        let v = row[i]!==undefined ? row[i] : "";
        if(CHECKBOX_FIELDS.includes(h)) v = (v==="TRUE"||v===true);
        obj[h] = v;
      });
      if(!obj.id) obj.id = uid(type[0]);
      return obj;
    });
}
async function ensureSpreadsheetStructure(){
  const meta = await sheetsFetch("");
  const existing = new Set((meta.sheets||[]).map(s=>s.properties.title));
  const wanted = [...SHEET_TYPES.map(cap), "Team"];
  const toAdd = wanted.filter(w=>!existing.has(w));
  if(!toAdd.length) return;
  await sheetsFetch(":batchUpdate", {method:"POST", body: JSON.stringify({
    requests: toAdd.map(title=>({addSheet:{properties:{title}}}))
  })});
}
async function pushTypeToSheet(type){
  const name = cap(type);
  const rows = rowsForSheet(type);
  await sheetsFetch(`/values/${encodeURIComponent(name+"!A1:ZZ20000")}:clear`, {method:"POST"});
  await sheetsFetch(`/values/${encodeURIComponent(name+"!A1")}?valueInputOption=RAW`, {method:"PUT", body: JSON.stringify({values: rows})});
}
async function pullTypeFromSheet(type){
  const name = cap(type);
  const data = await sheetsFetch(`/values/${encodeURIComponent(name+"!A1:ZZ20000")}`);
  const records = recordsFromSheetValues(type, data.values||[]);
  if(records.length) db[type] = records;
}
async function pushTeamToSheet(){
  const rows = [["name"], ...db.team.map(n=>[n])];
  await sheetsFetch(`/values/${encodeURIComponent("Team!A1:Z1000")}:clear`, {method:"POST"});
  await sheetsFetch(`/values/${encodeURIComponent("Team!A1")}?valueInputOption=RAW`, {method:"PUT", body: JSON.stringify({values: rows})});
}
async function pullTeamFromSheet(){
  const data = await sheetsFetch(`/values/${encodeURIComponent("Team!A1:Z1000")}`);
  const names = (data.values||[]).slice(1).map(r=>r[0]).filter(Boolean);
  if(names.length) db.team = names;
}
function autoPushType(type){
  if(gstate.accessToken && gstate.spreadsheetId){
    const p = type==="team" ? pushTeamToSheet() : pushTypeToSheet(type);
    p.then(()=>{ gstate.lastSync=new Date(); updateSyncStatus(); })
     .catch(err=>{ console.error(err); toast("Background sync failed: "+err.message); });
  }
}
async function pushAllToSheets(){
  if(!gstate.accessToken || !gstate.spreadsheetId){ toast("Connect Google and set a shared spreadsheet first"); return; }
  gstate.syncing = true; updateSyncStatus();
  try{
    await ensureSpreadsheetStructure();
    await Promise.all([...SHEET_TYPES.map(pushTypeToSheet), pushTeamToSheet()]);
    gstate.lastSync = new Date();
    toast("Pushed everything to the shared spreadsheet");
  }catch(err){ toast("Push failed: "+err.message); }
  gstate.syncing = false; updateSyncStatus();
}
async function pullAllFromSheets(){
  if(!gstate.accessToken || !gstate.spreadsheetId){ toast("Connect Google and set a shared spreadsheet first"); return; }
  gstate.syncing = true; updateSyncStatus();
  try{
    await Promise.all([...SHEET_TYPES.map(pullTypeFromSheet), pullTeamFromSheet()]);
    gstate.lastSync = new Date();
    renderAll(); switchTab(currentTab);
    toast("Pulled the latest from the shared spreadsheet");
  }catch(err){ toast("Pull failed: "+err.message); }
  gstate.syncing = false; updateSyncStatus();
}
async function createNewSpreadsheet(){
  if(!gstate.accessToken){ toast("Connect Google first"); return; }
  gstate.syncing = true; updateSyncStatus();
  try{
    const resp = await fetch("https://sheets.googleapis.com/v4/spreadsheets", {
      method:"POST",
      headers:{Authorization:"Bearer "+gstate.accessToken, "Content-Type":"application/json"},
      body: JSON.stringify({properties:{title:"AI Geo Navigators — BD Intelligence (shared data)"}})
    });
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();
    gstate.spreadsheetId = data.spreadsheetId;
    gstate.spreadsheetUrl = data.spreadsheetUrl || `https://docs.google.com/spreadsheets/d/${data.spreadsheetId}/edit`;
    updateURLParam(gstate.spreadsheetId);
    toast("Spreadsheet created — populating it with current data…");
    await ensureSpreadsheetStructure();
    await Promise.all([...SHEET_TYPES.map(pushTypeToSheet), pushTeamToSheet()]);
    gstate.lastSync = new Date();
    toast("Shared spreadsheet is ready — copy the link for your team");
  }catch(err){ toast("Could not create spreadsheet: "+err.message); }
  gstate.syncing = false; updateSyncStatus(); renderSettings();
}
function useSpreadsheet(){
  const raw = document.getElementById("sheet-id-input").value;
  const id = parseSpreadsheetId(raw);
  if(!id){ toast("Paste a spreadsheet ID or URL"); return; }
  gstate.spreadsheetId = id;
  gstate.spreadsheetUrl = `https://docs.google.com/spreadsheets/d/${id}/edit`;
  updateURLParam(id);
  renderSettings();
  if(!gstate.accessToken){ toast("Spreadsheet set — now click Connect Google"); return; }
  toast("Pulling data from that spreadsheet…");
  ensureSpreadsheetStructure().then(pullAllFromSheets);
}

/* ===================== CALENDAR (internal + Google Calendar) ===================== */
function toCalDate(v){ const d=new Date(v); return d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"; }
function safeICS(s){ return String(s||"").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;"); }
function calRecord(type, id){
  const r = db[type].find(x=>x.id===id);
  if(!r) return null;
  if(type==="meetings") return {title:r.title, start:r.start, end:r.end, details:r.agenda||r.nextSteps||"", location:r.location||r.org||""};
  if(type==="events") return {title:r.event, start:r.start, end:r.end, details:r.expectedOutcome||r.notes||"", location:[r.city,r.country].filter(Boolean).join(", ")};
  return null;
}
function googleCalLink(type, id){
  const r = calRecord(type,id);
  if(!r || !r.start){ toast("This record has no date/time set"); return; }
  const start = toCalDate(r.start), end = toCalDate(r.end||r.start);
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(r.title)}&dates=${start}/${end}&details=${encodeURIComponent(r.details)}&location=${encodeURIComponent(r.location)}`;
  window.open(url,"_blank");
}
function icsEvent(r){
  const start = toCalDate(r.start), end = toCalDate(r.end||r.start);
  return `BEGIN:VEVENT\nUID:${uid("agn")}@agn-dashboard\nDTSTAMP:${toCalDate(new Date().toISOString())}\nDTSTART:${start}\nDTEND:${end}\nSUMMARY:${safeICS(r.title)}\nDESCRIPTION:${safeICS(r.details)}\nLOCATION:${safeICS(r.location)}\nEND:VEVENT`;
}
function exportICS(type, id){
  const r = calRecord(type,id);
  if(!r || !r.start){ toast("This record has no date/time set"); return; }
  downloadBlob("agn-event.ics", `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AI Geo Navigators//BD Intelligence//EN\n${icsEvent(r)}\nEND:VCALENDAR`, "text/calendar");
}
function exportAllICS(){
  const items = [...db.meetings.map(m=>calRecord("meetings",m.id)), ...db.events.map(e=>calRecord("events",e.id))].filter(x=>x&&x.start);
  if(!items.length){ toast("No dated meetings or events yet"); return; }
  downloadBlob("agn-upcoming.ics", `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AI Geo Navigators//BD Intelligence//EN\n${items.map(icsEvent).join("\n")}\nEND:VCALENDAR`, "text/calendar");
}
window.googleCalLink = googleCalLink;
window.exportICS = exportICS;
window.exportAllICS = exportAllICS;

function gcalShowEmbed(){
  const id = document.getElementById("gcal-embed-id").value.trim();
  if(!id){ toast("Enter a calendar ID or the account email first"); return; }
  gstate.embedId = id;
  renderCalendarTab();
  toast("Calendar embedded — make sure it's shared as public or \"available to public\" in Google Calendar settings");
}
function fetchGoogleEvents(){
  const calendarId = (document.getElementById("gcal-calendar-id")?.value || "").trim() || gstate.calendarId || "primary";
  gstate.calendarId = calendarId;
  const timeMin = new Date().toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${encodeURIComponent(timeMin)}&maxResults=20&orderBy=startTime&singleEvents=true`;
  fetch(url, {headers:{Authorization:"Bearer "+gstate.accessToken}})
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(data=>{
      gstate.liveEvents = (data.items||[]).map(ev=>({
        id: ev.id, title: ev.summary||"(untitled event)",
        start: ev.start?.dateTime || ev.start?.date, end: ev.end?.dateTime || ev.end?.date,
        location: ev.location||"", link: ev.htmlLink
      }));
      renderCalendarTab();
      toast(`Pulled ${gstate.liveEvents.length} upcoming events from Google Calendar`);
    })
    .catch(err=>{ toast("Could not load Google Calendar events: "+err.message); });
}
window.gcalShowEmbed = gcalShowEmbed;

function genDraftEmail(ev){
  ev.preventDefault();
  const f = ev.target;
  const org = f.org.value.trim(), contact = f.contact.value.trim(), sector = f.sector.value.trim(),
        product = f.product.value, hook = f.hook.value.trim();
  const prod = db.products.find(p=>p.product===product);
  const greeting = contact ? `Dear ${contact},` : `Dear ${org} team,`;
  let body = `Subject: AI Geo Navigators × ${org} — climate & geospatial intelligence collaboration\n\n${greeting}\n\n`;
  body += `I'm reaching out from AI Geo Navigators, a climate-intelligence and geospatial firm based in Islamabad`+
          (sector ? `, working closely on ${sector}.` : `.`) + `\n\n`;
  if(hook) body += `${hook}\n\n`;
  if(prod){
    body += `I think our ${prod.product} (${prod.type}) could be directly useful here — ${prod.value}\n\n`;
  }
  body += `We'd welcome a short call to explore where our work overlaps with ${org}'s priorities, and what a first collaboration could look like.\n\n`;
  body += `Track record: ${AGN_TRACK_RECORD}.\n\nBest regards,\n${AGN_SIGNATURE}`;
  setAIOutput(body);
}

  ev.preventDefault();
  const f = ev.target;
  const fake = {
    sector: f.sector.value, scope: f.scope.value,
    eligibilityConfirmed: f.eligibilityConfirmed.checked, eligibility: f.eligibilityConfirmed.checked ? "confirmed" : "",
    budget: f.budget.value, relationship: f.relationship.value, deadline: f.deadline.value
  };
  const s = scoreOpportunity(fake);
  const body = `OPPORTUNITY RELEVANCE SCORE\n${"=".repeat(40)}\n\nScore: ${s.total} / 100\nDecision: ${s.decision}\n\nBreakdown:\n${s.reasons.map(r=>"  • "+r).join("\n")}\n\nWeights: Sector match 25 · Country/internationalisation value 20 · Eligibility fit 20 · Budget/value 15 · Relationship strength 10 · Deadline feasibility 10.`;
  setAIOutput(body);
}
window.genQuickScore = genQuickScore;

function genDigest(){
  const stamp = new Date().toLocaleString();
  const activeOpp = db.opportunities.filter(o=>!["Won","Lost","Archived"].includes(o.status));
  const wonThisSet = db.opportunities.filter(o=>o.status==="Won");
  const upcomingMeetings = db.meetings.filter(m=>{const d=daysUntil((m.start||"").slice(0,10)); return d!==null&&d>=0&&d<=7;});
  const upcomingEvents = db.events.filter(e=>{const d=daysUntil((e.start||"").slice(0,10)); return d!==null&&d>=0&&d<=14;});
  const dueTasks = db.tasks.filter(t=>{const d=daysUntil(t.due); return t.status!=="Done" && d!==null && d<=7;});

  let body = `WEEKLY BUSINESS DEVELOPMENT DIGEST\nGenerated ${stamp}\n${"=".repeat(50)}\n\n`;
  body += `PIPELINE\n${"-".repeat(20)}\nActive opportunities: ${activeOpp.length}\nWon (all-time): ${wonThisSet.length}\n`;
  activeOpp.slice(0,8).forEach(o=>{ const s=scoreOpportunity(o); body += `  • ${o.title} — ${o.status} — score ${s.total}/100 (${s.decision})\n`; });
  body += `\nMEETINGS — next 7 days\n${"-".repeat(20)}\n`;
  body += upcomingMeetings.length ? upcomingMeetings.map(m=>`  • ${fmtDateTime(m.start)} — ${m.title} (${m.org||""})\n`).join("") : `  None scheduled.\n`;
  body += `\nEVENTS — next 14 days\n${"-".repeat(20)}\n`;
  body += upcomingEvents.length ? upcomingEvents.map(e=>`  • ${fmtDate(e.start)} — ${e.event} [${e.status}]\n`).join("") : `  None scheduled.\n`;
  body += `\nCOMMUNICATIONS\n${"-".repeat(20)}\nLogged: ${db.communications.length}  ·  Response rate: ${commResponseRate()}%\n`;
  body += `\nPRIORITY FOLLOW-UPS (due ≤7 days)\n${"-".repeat(20)}\n`;
  body += dueTasks.length ? dueTasks.map(t=>`  • ${t.task} — ${t.owner} — due ${fmtDate(t.due)}\n`).join("") : `  None due.\n`;
  body += `\n${"=".repeat(50)}\nAI Geo Navigators · www.aigeo360.com · info@aigeo360.com`;
  setAIOutput(body);
}
window.genDigest = genDigest;

function saveTeam(){
  const names = document.getElementById("team-editor").value.split(",").map(s=>s.trim()).filter(Boolean);
  if(!names.length){ toast("Enter at least one name"); return; }
  db.team = names;
  renderAll(); switchTab(currentTab);
  toast("Team roster updated");
  autoPushType("team");
}
window.saveTeam = saveTeam;

function exportAllJSON(){
  downloadBlob(`agn-bd-backup-${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(db,null,2), "application/json");
  toast("Backup downloaded");
}
function importAllJSON(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const incoming = JSON.parse(reader.result);
      if(!incoming.organizations || !incoming.contacts) throw new Error("Invalid backup file");
      db = incoming;
      renderAll(); switchTab("overview");
      toast("Backup imported");
    }catch(err){ alert("Could not read this file as a valid backup: "+err.message); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm("Reset to the original sample data? Everything added this session will be lost (export first if you want to keep it).")) return;
  db = JSON.parse(JSON.stringify(SEED));
  renderAll(); switchTab("overview");
  toast("Reset to sample data");
}
window.exportAllJSON = exportAllJSON;
window.importAllJSON = importAllJSON;
window.resetAll = resetAll;

/* ===================== INIT ===================== */
function init(){
  try{
    const params = new URLSearchParams(window.location.search);
    const sheetParam = params.get("sheet");
    if(sheetParam){
      gstate.spreadsheetId = sheetParam;
      gstate.spreadsheetUrl = `https://docs.google.com/spreadsheets/d/${sheetParam}/edit`;
    }
  }catch(e){ /* ignore on origins without full URL support */ }
  renderNav();
  renderAll();
  renderAI();
  switchTab("overview");
  updateSyncStatus();
  updateClock();
  setInterval(updateClock, 30000);
  document.getElementById("drawerForm").addEventListener("submit", saveRecord);
  document.body.addEventListener("change", e=>{
    if(e.target && e.target.id==="import-file") importAllJSON(e);
  });
  if(gstate.spreadsheetId){
    toast("This link points at a shared spreadsheet — click Connect Google in Settings to sync.");
  }
}
function updateClock(){
  const el = document.getElementById("clockbox");
  if(el) el.textContent = new Date().toLocaleString(undefined,{weekday:"short",year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
document.addEventListener("DOMContentLoaded", init);
